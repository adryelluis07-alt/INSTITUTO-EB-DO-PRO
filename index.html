<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SISTEMA MILITAR | BGEex</title>

<style>
:root {
    --vermelho:#ff0000;
    --preto:#0a0a0a;
    --cinza:#1a1a1a;
    --dourado:#ffd700;
}

body {
    background: var(--preto);
    color:white;
    font-family: Arial;
    text-align:center;
    padding:15px;
    margin:0;
}

.btn-comprar-topo{
    position:fixed;
    top:15px;
    right:15px;
    color:var(--vermelho);
    font-weight:bold;
    cursor:pointer;
    z-index:9999;
}

.card{
    background:var(--cinza);
    border:2px solid var(--vermelho);
    border-radius:10px;
    padding:20px;
    max-width:600px;
    margin:60px auto 20px;
}

h1{color:var(--vermelho)}

input,select,textarea{
    width:100%;
    padding:15px;
    margin:10px 0;
    background:#222;
    color:white;
}

.questao{
    text-align:left;
    background:#111;
    padding:15px;
    margin-bottom:10px;
    border-left:4px solid var(--vermelho);
}

.btn-enviar{
    background:var(--vermelho);
    color:white;
    padding:20px;
    border:none;
    width:100%;
}

#loja_patentes{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:black;
    overflow:auto;
    padding:20px;
}

.loja-container{
    max-width:600px;
    margin:auto;
    background:var(--cinza);
    border:2px solid var(--dourado);
    padding:20px;
}

.item-patente{
    background:#222;
    margin:8px 0;
    padding:10px;
    display:flex;
    justify-content:space-between;
}

.preco{color:#0f0}

.btn-pagar{
    background:#0f0;
    border:none;
    cursor:pointer;
}

#tela_pix{display:none}

.codigo-pix{
    background:#333;
    color:#0f0;
    padding:10px;
    word-break:break-all;
}
</style>
</head>

<body>

<div class="btn-comprar-topo" onclick="abrirLoja()">COMPRAR PATENTE</div>

<div class="card">
<h1>BGEex</h1>

<input id="nome_discord" placeholder="Seu Discord">

<select id="selecao_curso" onchange="carregarQuestoes()">
<option value="">ESCOLHA O CURSO</option>
<option value="IFB">IFB</option>
<option value="CLD">CLD</option>
<option value="CGE">CGE</option>
</select>

<div id="questoes_container"></div>

<button class="btn-enviar" onclick="enviarParaDiscord()">ENVIAR</button>
</div>

<div id="loja_patentes">

<div class="loja-container">

<h2 style="color:var(--dourado)">LOJA</h2>

<div id="lista_patentes">

<div class="item-patente"><span>DEVELOPERS</span><span class="preco">R$200</span><button class="btn-pagar" onclick="gerarPix('Developers','200')">COMPRAR</button></div>
<div class="item-patente"><span>REI DAS MALDIÇÕES</span><span class="preco">R$50</span><button class="btn-pagar" onclick="gerarPix('Rei','50')">COMPRAR</button></div>
<div class="item-patente"><span>SEIS OLHOS</span><span class="preco">R$40</span><button class="btn-pagar" onclick="gerarPix('Seis Olhos','40')">COMPRAR</button></div>
<div class="item-patente"><span>HEAD ADMIN</span><span class="preco">R$30</span><button class="btn-pagar" onclick="gerarPix('Head','30')">COMPRAR</button></div>
<div class="item-patente"><span>STAFF</span><span class="preco">R$25</span><button class="btn-pagar" onclick="gerarPix('Staff','25')">COMPRAR</button></div>
<div class="item-patente"><span>SENADOR</span><span class="preco">R$20</span><button class="btn-pagar" onclick="gerarPix('Senador','20')">COMPRAR</button></div>
<div class="item-patente"><span>AHD</span><span class="preco">R$15</span><button class="btn-pagar" onclick="gerarPix('AHD','15')">COMPRAR</button></div>
<div class="item-patente"><span>GERENTE</span><span class="preco">R$12</span><button class="btn-pagar" onclick="gerarPix('Gerente','12')">COMPRAR</button></div>
<div class="item-patente"><span>SUB GERENTE</span><span class="preco">R$10</span><button class="btn-pagar" onclick="gerarPix('Sub','10')">COMPRAR</button></div>
<div class="item-patente"><span>ENTREGADOR</span><span class="preco">R$8</span><button class="btn-pagar" onclick="gerarPix('Entregador','8')">COMPRAR</button></div>
<div class="item-patente"><span>HELPER</span><span class="preco">R$5</span><button class="btn-pagar" onclick="gerarPix('Helper','5')">COMPRAR</button></div>
<div class="item-patente"><span>VIP</span><span class="preco">R$3</span><button class="btn-pagar" onclick="gerarPix('VIP','3')">COMPRAR</button></div>

</div>

<div id="tela_pix">

<h3>PAGAMENTO PIX</h3>

<p id="patente_info"></p>

<div class="codigo-pix" id="pix_texto"></div>

<img id="qr_pix">

<button onclick="copiarPix()">COPIAR PIX</button>

<!-- PicPay sem mudar layout -->
<span id="picpay_user" style="display:none">@SEU_USUARIO</span>

</div>

<button onclick="fecharLoja()">FECHAR</button>

</div>

</div>

<script>

const banco={
IFB:["Q1","Q2","Q3"],
CLD:["Q1","Q2","Q3"],
CGE:["Q1","Q2","Q3"]
};

function carregarQuestoes(){
const c=document.getElementById("selecao_curso").value;
const div=document.getElementById("questoes_container");
div.innerHTML="";
if(!c)return;

banco[c].forEach((q,i)=>{
div.innerHTML+=`
<div class="questao">
<p>${q}</p>
<textarea id="res_${i}"></textarea>
</div>`;
});
}

function abrirLoja(){document.getElementById("loja_patentes").style.display="block"}
function fecharLoja(){document.getElementById("loja_patentes").style.display="none"}

function gerarPix(produto,valor){
document.getElementById("lista_patentes").style.display="none";
document.getElementById("tela_pix").style.display="block";

document.getElementById("patente_info").innerText=produto+" R$"+valor;
document.getElementById("pix_texto").innerText="PIX_"+produto+"_"+valor;
}

function copiarPix(){
navigator.clipboard.writeText(document.getElementById("pix_texto").innerText);
alert("copiado");
}

function enviarParaDiscord(){
alert("enviado");
}

</script>

</body>
</html>
