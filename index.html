<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA MILITAR | BGEex</title>
    <style>
        :root {
            --vermelho: #ff0000;
            --preto: #0a0a0a;
            --cinza: #1a1a1a;
            --dourado: #ffd700;
        }

        body {
            background: var(--preto);
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 15px;
            margin: 0;
        }

        .btn-comprar-topo {
            position: fixed;
            top: 15px;
            right: 15px;
            color: var(--vermelho);
            text-decoration: underline;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            z-index: 9999;
            font-size: 13px;
            padding: 10px;
        }

        .card {
            background: var(--cinza);
            border: 2px solid var(--vermelho);
            border-radius: 10px;
            padding: 20px;
            max-width: 600px;
            margin: 60px auto 20px;
        }

        h1 {
            color: var(--vermelho);
            text-transform: uppercase;
            font-size: 1.4em;
        }

        input, select, textarea {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #444;
            background: #222;
            color: #fff;
            box-sizing: border-box;
            font-size: 16px;
        }

        .questao {
            text-align: left;
            background: #111;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            border-left: 5px solid var(--vermelho);
        }

        .btn-enviar {
            background: var(--vermelho);
            color: white;
            padding: 20px;
            border: none;
            width: 100%;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
            font-size: 1.1em;
        }

        #loja_patentes {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 10000;
            overflow-y: auto;
            padding: 20px;
            box-sizing: border-box;
        }

        .loja-container {
            max-width: 550px;
            margin: auto;
            background: var(--cinza);
            border: 2px solid var(--dourado);
            padding: 20px;
            border-radius: 15px;
        }

        .item-patente {
            background: #222;
            margin: 8px 0;
            padding: 10px;
            border-radius: 8px;
            border-left: 4px solid var(--dourado);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
        }

        .preco {
            color: #0f0;
            font-weight: bold;
        }

        .btn-pagar {
            background: #0f0;
            color: #000;
            border: none;
            padding: 6px 10px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
        }

        #tela_pix {
            display: none;
            text-align: center;
        }

        #qr_pix {
            width: 200px;
            height: 200px;
            background: white;
            padding: 10px;
            border-radius: 10px;
            margin: 15px auto;
        }

        .codigo-pix {
            background: #333;
            color: #0f0;
            padding: 10px;
            word-break: break-all;
            font-family: monospace;
            font-size: 10px;
            margin: 15px 0;
            border-radius: 5px;
        }

        .btn-copiar {
            background: #5865F2;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 5px;
            width: 100%;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="btn-comprar-topo" onclick="abrirLoja()">🛒 COMPRAR PATENTE</div>

<div class="card">
    <h1>𝗠𝗘𝗡𝗧𝗘⠀𝗚𝗘𝗡𝗜𝗔𝗟</h1>
    <p>📡 PORTAL DE AVALIAÇÕES</p>

    <input type="text" id="nome_discord" placeholder="SEU NOME NO DISCORD">

    <select id="selecao_curso" onchange="carregarQuestoes()">
        <option value="">-- ESCOLHA O CURSO --</option>
        <option value="IFB">INSTRUÇÃO BÁSICA (IFB)</option>
        <option value="CLD">CURSO DE LIDERANÇA (CLD)</option>
        <option value="CGE">GUERRA ELETRÔNICA (CGE)</option>
    </select>

    <div id="questoes_container"></div>

    <button class="btn-enviar" onclick="enviarParaDiscord()">ENVIAR AO QG</button>
</div>

<div id="loja_patentes">
    <div class="loja-container">
        <h2 style="color:var(--dourado); text-align:center;">🏛️ SHOP UNIFICADO - BGEex</h2>

        <div id="lista_patentes">
            <div class="item-patente"><span>DEVELOPERS</span> <span class="preco">R$ 200,00</span> <button class="btn-pagar" onclick="gerarPix('Developers','200.00')">COMPRAR</button></div>
            <div class="item-patente"><span>[DK] REI DAS MALDIÇÕES</span> <span class="preco">R$ 50,00</span> <button class="btn-pagar" onclick="gerarPix('Rei das Maldições','50.00')">COMPRAR</button></div>
        </div>

        <div id="tela_pix">
            <h3 style="color:#0f0">PAGAMENTO PIX</h3>
            <p id="patente_info"></p>

            <img id="qr_pix" src="">
            <div class="codigo-pix" id="pix_texto"></div>

            <button class="btn-copiar" onclick="copiarPix()">📋 COPIAR CÓDIGO PIX</button>
            <button class="btn-copiar" onclick="copiarPicPay()">💳 COPIAR PICPAY</button>

            <button class="btn-enviar" onclick="voltarLista()" style="background:#444;">VOLTAR</button>

            <!-- PicPay escondido (não muda aparência) -->
            <span id="picpay_user" style="display:none">@SEU_USUARIO</span>
        </div>

        <button onclick="fecharLoja()" style="width:100%; margin-top:15px; background:none; color:white; border:1px solid #555; padding:10px; cursor:pointer;">FECHAR</button>
    </div>
</div>

<script>
    const CHAVE_PIX = "DANILOBTU88@GMAIL.COM";
    const NOME_RECEBEDOR = "DANILO";
    const CIDADE_RECEBEDOR = "BOTUCATU";

    function abrirLoja() {
        document.getElementById('loja_patentes').style.display = 'block';
    }

    function fecharLoja() {
        document.getElementById('loja_patentes').style.display = 'none';
    }

    function voltarLista() {
        document.getElementById('tela_pix').style.display = 'none';
        document.getElementById('lista_patentes').style.display = 'block';
    }

    function emv(id, value) {
        return id + value.length.toString().padStart(2, '0') + value;
    }

    function crc16(payload) {
        let polinomio = 0x1021;
        let resultado = 0xFFFF;
        for (let i = 0; i < payload.length; i++) {
            resultado ^= (payload.charCodeAt(i) << 8);
            for (let j = 0; j < 8; j++) {
                resultado = (resultado & 0x8000) ? (resultado << 1) ^ polinomio : resultado << 1;
                resultado &= 0xFFFF;
            }
        }
        return resultado.toString(16).toUpperCase().padStart(4, '0');
    }

    function gerarPix(produto, valor) {
        document.getElementById('lista_patentes').style.display = 'none';
        document.getElementById('tela_pix').style.display = 'block';

        document.getElementById('patente_info').innerText =
            `${produto} | R$ ${valor}`;

        let payload =
            emv("00", "01") +
            emv("01", "11") +
            emv("26", emv("00", "br.gov.bcb.pix") + emv("01", CHAVE_PIX)) +
            emv("52", "0000") +
            emv("53", "986") +
            emv("54", valor) +
            emv("58", "BR") +
            emv("59", NOME_RECEBEDOR) +
            emv("60", CIDADE_RECEBEDOR) +
            emv("62", emv("05", "BGEEX")) +
            "6304";

        const crc = crc16(payload);
        const pixCode = payload + crc;

        document.getElementById('pix_texto').innerText = pixCode;
        document.getElementById('qr_pix').src =
            "https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=" +
            encodeURIComponent(pixCode);
    }

    function copiarPix() {
        navigator.clipboard.writeText(document.getElementById('pix_texto').innerText);
        alert("PIX copiado!");
    }

    function copiarPicPay() {
        navigator.clipboard.writeText(document.getElementById('picpay_user').innerText);
        alert("PicPay copiado!");
    }
</script>

</body>
</html>
