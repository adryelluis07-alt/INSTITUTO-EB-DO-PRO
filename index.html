<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INSTITUTO MENTE GENIAL | PROVAS</title>
    <style>
        :root { --vermelho: #ff0000; --preto: #0a0a0a; --cinza: #1a1a1a; }
        body { background: var(--preto); color: white; font-family: sans-serif; text-align: center; padding: 15px; margin: 0; }
        .card { background: var(--cinza); border: 2px solid var(--vermelho); border-radius: 10px; padding: 20px; max-width: 600px; margin: 20px auto; box-shadow: 0 0 20px rgba(255,0,0,0.4); }
        h1 { color: var(--vermelho); text-transform: uppercase; letter-spacing: 2px; font-size: 1.5em; }
        select, input, textarea { width: 100%; padding: 15px; margin: 10px 0; border-radius: 5px; border: 1px solid #444; box-sizing: border-box; background: #222; color: #fff; font-size: 16px; }
        .questao { text-align: left; background: #111; padding: 15px; border-radius: 5px; margin-bottom: 20px; border-left: 5px solid var(--vermelho); }
        .nivel { font-size: 0.75em; font-weight: bold; text-transform: uppercase; display: block; margin-bottom: 5px; }
        .facil { color: #00ff00; }
        .dificil { color: #ff0000; }
        .btn { background: var(--vermelho); color: white; padding: 22px; border: none; width: 100%; font-weight: bold; cursor: pointer; margin-top: 30px; font-size: 1.3em; border-radius: 8px; text-transform: uppercase; box-shadow: 0 5px 15px rgba(255,0,0,0.4); }
        #area_provas { display: block; min-height: 300px; }
    </style>
</head>
<body>

    <div class="card">
        <h1>𝗠𝗘𝗡𝗧𝗘⠀𝗚𝗘𝗡𝗜𝗔𝗟⠀𝗜𝗡𝗦𝗧𝗜𝗧𝗨𝗧𝗢</h1>
        <p>📡 SISTEMA DE AVALIAÇÃO BGEex</p>
        
        <input type="text" id="nome_discord" placeholder="SEU NOME E TAG (Ex: Adryel#0000)">
        
        <p>ESCOLHA SUA ESPECIALIZAÇÃO PARA CARREGAR AS QUESTÕES:</p>
        <select id="selecao_curso" onchange="carregarQuestoes()">
            <option value="">-- CLIQUE AQUI PARA SELECIONAR --</option>
            <option value="IFB">INSTRUÇÃO BÁSICA (IFB)</option>
            <option value="AMAN">ACADEMIA MILITAR (AMAN)</option>
            <option value="CGE">GUERRA ELETRÔNICA (CGEex)</option>
        </select>

        <div id="area_provas">
            <div id="questoes_container">
                <p style="color: #888; padding: 40px 0;">Aguardando seleção de curso...</p>
            </div>
            <button class="btn" onclick="enviarParaDiscord()">FINALIZAR E ENVIAR AO QG</button>
        </div>
    </div>

    <script>
    const banco = {
        "IFB": [
            {t: "Fácil", q: "Qual a única resposta permitida ao receber ordens?"},
            {t: "Fácil", q: "Qual o prefixo de Recruta no servidor?"},
            {t: "Fácil", q: "Onde ficam os comunicados oficiais do comando?"},
            {t: "Fácil", q: "É permitido desrespeitar a hierarquia no chat?"},
            {t: "Fácil", q: "O que significa a sigla EB?"},
            {t: "Difícil", q: "Explique a diferença entre Insubordinação e Deserção:"},
            {t: "Difícil", q: "Qual o protocolo de saudação ao General?"},
            {t: "Difícil", q: "Como agir em caso de invasão de civis?"},
            {t: "Difícil", q: "Defina o conceito de Disciplina Militar no RP:"},
            {t: "Difícil", q: "O que fazer se um superior quebrar as regras?"}
        ],
        "AMAN": [
            {t: "Fácil", q: "O que significa a sigla AMAN?"},
            {t: "Fácil", q: "Qual a patente logo acima de Cadete?"},
            {t: "Fácil", q: "O que é um Aspirante a Oficial?"},
            {t: "Fácil", q: "Qual o lema principal da Academia Militar?"},
            {t: "Fácil", q: "Um oficial pode ser punido por um praça?"},
            {t: "Difícil", q: "Descreva uma estratégia de cerco em área urbana:"},
            {t: "Difícil", q: "Como organizar uma linha de frente sob fogo pesado?"},
            {t: "Difícil", q: "Defina a ética de um Oficial frente a subordinados:"},
            {t: "Difícil", q: "Como planejar uma escolta VIP de alto risco?"},
            {t: "Difícil", q: "Qual o protocolo de rendição de tropas inimigas?"}
        ],
        "CGE": [
            {t: "Fácil", q: "O que significa o código QSL no rádio?"},
            {t: "Fácil", q: "Qual a missão principal do BGEex?"},
            {t: "Fácil", q: "O que significa QAP no rádio?"},
            {t: "Fácil", q: "O sigilo das comunicações é opcional?"},
            {t: "Fácil", q: "O BGEex protege qual tipo de informação?"},
            {t: "Difícil", q: "Como detectar uma interceptação de rádio inimiga?"},
            {t: "Difícil", q: "Explique o processo de triangulação de sinal rádio:"},
            {t: "Difícil", q: "O que é Guerra Cibernética no contexto militar?"},
            {t: "Difícil", q: "Como agir se a frequência principal for hackeada?"},
            {t: "Difícil", q: "Defina o uso de rádio silêncio em missões sigilosas:"}
        ]
    };

    function carregarQuestoes() {
        const curso = document.getElementById('selecao_curso').value;
        const container = document.getElementById('questoes_container');
        if (!curso) return;

        container.innerHTML = "";
        banco[curso].forEach((item, i) => {
            const cor = item.t === "Fácil" ? "facil" : "dificil";
            container.innerHTML += `
                <div class="questao">
                    <span class="nivel ${cor}">[ ${item.t} EXTREMO ]</span>
                    <p><b>${item.q}</b></p>
                    <textarea id="res_${i}" rows="3" placeholder="Digite sua resposta aqui..."></textarea>
                </div>`;
        });
        window.scrollBy(0, 300); // Rola a tela um pouco para baixo automaticamente
    }

    async function enviarParaDiscord() {
        const webhook = "https://discord.com";
        const nome = document.getElementById('nome_discord').value;
        const curso = document.getElementById('selecao_curso').value;

        if(!nome || !curso) return alert("RECRUTA! IDENTIFIQUE-SE E ESCOLHA UM CURSO!");

        let resps = "";
        for(let i=0; i<10; i++) {
            const r = document.getElementById('res_'+i).value || "NÃO RESPONDEU";
            resps += `**Q${i+1}:** ${r}\n`;
        }

        const payload = {
            embeds:
        };

        try {
            await fetch(webhook, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
            alert("PROVA ENVIADA AO QG COM SUCESSO!");
            window.location.reload();
        } catch (e) {
            alert("ERRO NO ENVIO!");
        }
    }
    </script>
</body>
</html>
