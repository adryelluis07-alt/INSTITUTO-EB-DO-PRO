<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INSTITUTO MENTE GENIAL | PROVAS</title>
    <style>
        :root { --vermelho: #ff0000; --preto: #0a0a0a; --cinza: #1a1a1a; }
        body { background: var(--preto); color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .card { background: var(--cinza); border: 2px solid var(--vermelho); border-radius: 10px; padding: 20px; max-width: 600px; margin: auto; }
        h1 { color: var(--vermelho); text-transform: uppercase; }
        select, input, textarea { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; border: none; box-sizing: border-box; background: #222; color: #fff; font-size: 16px; }
        .questao { text-align: left; background: #111; padding: 15px; border-radius: 5px; margin-bottom: 20px; border-left: 4px solid var(--vermelho); }
        .btn { background: var(--vermelho); color: white; padding: 20px; border: none; width: 100%; font-weight: bold; cursor: pointer; margin-top: 20px; font-size: 1.2em; border-radius: 8px; }
    </style>
</head>
<body>

    <div class="card">
        <h1>𝗠𝗘𝗡𝗧𝗘⠀𝗚𝗘𝗡𝗜𝗔𝗟⠀𝗜𝗡𝗦𝗧𝗜𝗧𝗨𝗧𝗢</h1>
        <p>IDENTIFIQUE-SE:</p>
        <input type="text" id="nome_discord" placeholder="SEU NOME#0000">
        
        <p>SELECIONE O CURSO:</p>
        <select id="selecao_curso" onchange="carregarQuestoes()">
            <option value="">-- CLIQUE AQUI E ESCOLHA --</option>
            <option value="IFB">INSTRUÇÃO BÁSICA (IFB)</option>
            <option value="AMAN">ACADEMIA MILITAR (AMAN)</option>
            <option value="CGE">GUERRA ELETRÔNICA (CGEex)</option>
        </select>

        <div id="area_provas">
            <div id="questoes_container">
                <p style="color: #666;">As questões aparecerão aqui após selecionar o curso acima.</p>
            </div>
            <button class="btn" onclick="enviarParaDiscord()">ENVIAR RESPOSTAS AO QG</button>
        </div>
    </div>

    <script>
    const banco = {
        "IFB": [
            {q: "1. Qual a frase obrigatória ao receber ordens?"},
            {q: "2. Qual o prefixo de Recruta?"},
            {q: "3. Onde ficam os avisos oficiais?"},
            {q: "4. Pode rir em formação?"},
            {q: "5. O que significa EB?"},
            {q: "6. Diferença entre Insubordinação e Deserção:"},
            {q: "7. Protocolo de saudação ao Comandante:"},
            {q: "8. Como agir em caso de invasão?"},
            {q: "9. Conceito de Disciplina Militar:"},
            {q: "10. O que fazer se um superior errar?"}
        ],
        "AMAN": [
            {q: "1. O que significa AMAN?"},
            {q: "2. Patente acima de Cadete?"},
            {q: "3. O que é um Aspirante?"},
            {q: "4. Lema da AMAN:"},
            {q: "5. Função do Oficial:"},
            {q: "6. Estratégia de cerco urbano:"},
            {q: "7. Como organizar linha de frente?"},
            {q: "8. Ética tática militar:"},
            {q: "9. Escolta de alto risco:"},
            {q: "10. Protocolo de rendição inimiga:"}
        ],
        "CGE": [
            {q: "1. Significado QSL:"},
            {q: "2. Frequência do BGEex:"},
            {q: "3. Significado QAP:"},
            {q: "4. Sigilo de rádio é vital?"},
            {q: "5. Missão principal do BGEex:"},
            {q: "6. Como detectar interceptação de sinal?"},
            {q: "7. Processo de triangulação:"},
            {q: "8. O que é Guerra Cibernética?"},
            {q: "9. Procedimento para rádio hackeado:"},
            {q: "10. Uso de rádio silêncio:"}
        ]
    };

    function carregarQuestoes() {
        const curso = document.getElementById('selecao_curso').value;
        const container = document.getElementById('questoes_container');
        if (!curso) return;

        container.innerHTML = "";
        banco[curso].forEach((item, i) => {
            container.innerHTML += `
                <div class="questao">
                    <p><b>${item.q}</b></p>
                    <textarea id="res_${i}" placeholder="Resposta extrema..."></textarea>
                </div>`;
        });
    }

    async function enviarParaDiscord() {
        const webhook = "COLE_SEU_WEBHOOK_AQUI"; 
        const nome = document.getElementById('nome_discord').value;
        const curso = document.getElementById('selecao_curso').value;

        if(!nome || !curso) return alert("PREENCHA SEU NOME E ESCOLHA O CURSO!");

        let resps = "";
        for(let i=0; i<10; i++) {
            resps += `**Q${i+1}:** ${document.getElementById('res_'+i).value}\n`;
        }

        await fetch(webhook, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                embeds: [{
                    title: `📑 PROVA: ${curso}`,
                    color: 16711680,
                    description: `**SOLDADO:** ${nome}\n\n**RESPOSTAS:**\n${resps}`
                }]
            })
        });
        alert("PROVA ENVIADA!");
    }
    </script>
</body>
</html>
