<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SISTEMA MILITAR | BGEex</title>

<style>
:root {
    --vermelho:#ff0000;
    --preto:#0a0a0a;
    --cinza:#1a1a1a;
    --dourado:#ffd700;
    --discord:#5865F2;
}

body {
    background: var(--preto);
    color:white;
    font-family: Arial;
    margin:0;
    padding:15px;
    text-align:center;
}

/* PAINEL DISCORD */
.discord-panel {
    position:fixed;
    top:15px;
    left:15px;
    width:270px;
    background:rgba(20,20,20,0.95);
    border:2px solid var(--discord);
    border-radius:10px;
    padding:12px;
    font-size:11px;
    text-align:left;
    z-index:9999;
}

.discord-panel a {
    color:#00ffcc;
    display:block;
    text-decoration:none;
}

/* BOTÃO TOPO */
.btn-comprar-topo {
    position:fixed;
    top:15px;
    right:15px;
    color:var(--vermelho);
    font-weight:bold;
    cursor:pointer;
    z-index:9999;
}

/* CARD PROVA */
.card {
    background:var(--cinza);
    border:2px solid var(--vermelho);
    max-width:600px;
    margin:70px auto;
    padding:20px;
    border-radius:10px;
}

input,select,textarea{
    width:100%;
    padding:12px;
    margin:8px 0;
    background:#222;
    color:white;
    border:1px solid #444;
}

/* LOJA */
#loja_patentes {
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.95);
    overflow-y:auto;
    z-index:10000;
    padding:20px;
}

.loja-container{
    max-width:550px;
    margin:auto;
    background:var(--cinza);
    border:2px solid var(--dourado);
    padding:20px;
    border-radius:10px;
}

.item-patente{
    background:#222;
    margin:8px 0;
    padding:10px;
    display:flex;
    justify-content:space-between;
    border-left:4px solid var(--dourado);
}

.btn-pagar{
    background:#0f0;
    border:none;
    cursor:pointer;
    font-weight:bold;
}

/* PIX */
#tela_pix{display:none;}

</style>
</head>

<body>

<!-- 🔵 PAINEL DISCORD -->
<div class="discord-panel">
<b>Entre nos Servers do Discord pra comprar suas Patentes e Ranks!</b>
<br><br>⬇️<br><br>

<b>Servers:</b><br><br>

<a href="https://discord.gg/SW2kctdRd" target="_blank">Server 1</a>
<a href="https://discord.gg/Eys2zFNAK" target="_blank">Server 2</a>
<a href="https://discord.gg/jfqgMGbJm" target="_blank">Server 3</a>
</div>

<!-- BOTÃO -->
<div class="btn-comprar-topo" onclick="abrirLoja()">🛒 COMPRAR PATENTE</div>

<!-- PROVAS -->
<div class="card">
<h1>MENTE GENIAL</h1>

<input id="nome_discord" placeholder="SEU NOME NO DISCORD">

<select id="selecao_curso" onchange="carregarQuestoes()">
<option value="">ESCOLHA O CURSO</option>
<option value="IFB">IFB</option>
<option value="CLD">CLD</option>
<option value="CGE">CGE</option>
</select>

<div id="questoes_container"></div>

<button onclick="enviarParaDiscord()">ENVIAR AO QG</button>
</div>

<!-- LOJA -->
<div id="loja_patentes">
<div class="loja-container">

<h2>SHOP BGEex</h2>

<input id="nome_comprador" placeholder="Nome no Discord">

<div class="item-patente">
<span>VIP</span><span>R$3</span>
<button class="btn-pagar" onclick="gerarPix('VIP','3')">COMPRAR</button>
</div>

<div class="item-patente">
<span>STAFF</span><span>R$25</span>
<button class="btn-pagar" onclick="gerarPix('STAFF','25')">COMPRAR</button>
</div>

<div id="tela_pix">
<h3>PIX GERADO</h3>
<p id="pix_info"></p>
<div id="pix_texto"></div>
</div>

<br>
<button onclick="fecharLoja()">FECHAR</button>

</div>
</div>

<script>

/* PIX */
const CHAVE_PIX = "DANILOBTU88@GMAIL.COM";

function abrirLoja(){
document.getElementById("loja_patentes").style.display="block";
}

function fecharLoja(){
document.getElementById("loja_patentes").style.display="none";
}

function gerarPix(produto,valor){
const nome=document.getElementById("nome_comprador").value;

if(!nome){
alert("Digite seu nome!");
return;
}

document.getElementById("pix_info").innerText=
produto+" - R$ "+valor+" - "+nome;

document.getElementById("pix_texto").innerText=
"PIX: "+CHAVE_PIX;
}

/* QUESTÕES 10 POR CURSO */
const banco = {
IFB:[
"Disciplina militar","Hierarquia","QAP","QSL","Respeito","Formação","Ordem","Recruta","Superior","Conduta"
],
CLD:[
"Liderança","Equipe","Estratégia","Comando","Responsabilidade","Motivação","Gestão","Decisão","Conflito","Organização"
],
CGE:[
"Cibersegurança","Sigilo","Rede","Proteção","Interceptação","QAP","QSL","Ataque","Defesa","Sistema"
]
};

function carregarQuestoes(){
let c=document.getElementById("selecao_curso").value;
let box=document.getElementById("questoes_container");
box.innerHTML="";

if(banco[c]){
banco[c].forEach((q,i)=>{
box.innerHTML+=`
<div>
<p>${i+1}. ${q}</p>
<textarea></textarea>
</div>`;
});
}
}

function enviarParaDiscord(){
alert("Enviado ao Discord!");
}

</script>

</body>
</html>
