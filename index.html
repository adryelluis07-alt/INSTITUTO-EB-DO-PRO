<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INSTITUTO MENTE GENIAL | PROVAS</title>
    <style>
        :root { --vermelho: #ff0000; --preto: #0a0a0a; --cinza: #1a1a1a; }
        body { background: var(--preto); color: white; font-family: sans-serif; text-align: center; padding: 15px; margin: 0; }
        .card { background: var(--cinza); border: 2px solid var(--vermelho); border-radius: 10px; padding: 20px; max-width: 600px; margin: 20px auto; box-shadow: 0 0 20px rgba(255,0,0,0.4); }
        h1 { color: var(--vermelho); text-transform: uppercase; font-size: 1.5em; margin-bottom: 0; }
        input, select, textarea { width: 100%; padding: 15px; margin: 10px 0; border-radius: 5px; border: 1px solid #444; background: #222; color: #fff; font-size: 16px; box-sizing: border-box; }
        .questao { text-align: left; background: #111; padding: 15px; border-radius: 5px; margin-bottom: 20px; border-left: 5px solid var(--vermelho); }
        .btn { background: var(--vermelho); color: white; padding: 20px; border: none; width: 100%; font-weight: bold; cursor: pointer; margin-top: 20px; font-size: 1.2em; border-radius: 8px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="card">
        <h1>𝗠𝗘𝗡𝗧𝗘⠀𝗚𝗘𝗡𝗜𝗔𝗟⠀𝗜𝗡𝗦𝗧𝗜𝗧𝗨𝗧𝗢</h1>
        <p>📡 SISTEMA DE AVALIAÇÃO BGEex</p>
        
        <input type="text" id="nome_discord" placeholder="SEU NOME E TAG (Ex: Adryel#0000)">
        
        <p>SELECIONE O CURSO:</p>
        <select id="selecao_curso" onchange="carregarQuestoes()">
            <option value="">-- CLIQUE PARA ESCOLHER --</option>
            <option value="IFB">INSTRUÇÃO BÁSICA (IFB)</option>
            <option value="AMAN">ACADEMIA MILITAR (AMAN)</option>
            <option value="CGE">GUERRA ELETRÔNICA (CGEex)</option>
        </select>

        <div id="area_provas">
            <div id="questoes_container">
                <p id="msg_espera" style="color: #888; padding: 20px;">Escolha o curso acima para ver as questões...</p>
            </div>
            <button class="btn" onclick="enviarParaDiscord()">FINALIZAR E ENVIAR AO QG</button>
        </div>
    </div>

    <script>
    const banco = {
        "IFB": [
            "1. Qual a única resposta permitida ao receber ordens?",
            "2. Qual o prefixo de Recruta no servidor?",
            "3. Onde ficam os comunicados oficiais?",
            "4. É permitido desrespeitar a hierarquia?",
            "5. O que significa a sigla EB?",
            "6. Diferença entre Insubordinação e Deserção:",
            "7. Protocolo de saudação ao Comandante:",
            "8. Como agir em caso de invasão de civis?",
            "9. Conceito de Disciplina Militar no RP:",
            "10. O que fazer se um superior quebrar as regras?"
        ],
        "AMAN": [
            "1. O que significa a sigla AMAN?",
            "2. Patente logo acima de Cadete?",
            "3. O que é um Aspirante a Oficial?",
            "4. Lema principal da Academia Militar?",
            "5. Um oficial pode ser punido por um praça?",
            "6. Estratégia de cerco em área urbana:",
            "7. Como organizar linha de frente sob fogo?",
            "8. Ética de um Oficial frente a subordinados:",
            "9. Planejamento de escolta VIP de alto risco:",
            "10. Protocolo de rendição de tropas inimigas?"
        ],
        "CGE": [
            "1. Significado do código QSL no rádio?",
            "2. Missão principal do BGEex?",
            "3. Significado de QAP no rádio?",
            "4. Sigilo das comunicações é opcional?",
            "5. O BGEex protege qual tipo de informação?",
            "6. Como detectar interceptação de rádio?",
            "7. Processo de triangulação de sinal rádio:",
            "8. O que é Guerra Cibernética no RP?",
            "9. Procedimento para rádio hackeado:",
            "10. Uso de rádio silêncio em missões?"
        ]
    };

    function carregarQuestoes() {
        const curso = document.getElementById('selecao_curso').value;
        const container = document.getElementById('questoes_container');
        
        if (!curso) return;

        container.innerHTML = ""; // Limpa a mensagem de espera
        
        banco[curso].forEach((pergunta, i) => {
            container.innerHTML += `
                <div class="questao">
                    <p><b>${pergunta}</b></p>
                    <textarea id="res_${i}" rows="3" placeholder="Sua resposta..."></textarea>
                </div>`;
        });
    }

    async function enviarParaDiscord() {
        const webhook = "https://discord.com";
        const nome = document.getElementById('nome_discord').value;
        const curso = document.getElementById('selecao_curso').value;

        if(!nome || !curso) return alert("ERRO: DIGITE SEU NOME E ESCOLHA O CURSO!");

        let resps = "";
        for(let i=0; i<10; i++) {
            const r = document.getElementById('res_'+i).value || "NÃO RESPONDEU";
            resps += `**Q${i+1}:** ${r}\n`;
        }

        const payload = {
            embeds: [{
                title: `📑 NOVA PROVA: ${curso}`,
                color: 16711680,
                description: `**SOLDADO:** ${nome}\n\n**RESPOSTAS:**\n${resps}`
            }]
        };

        await fetch(webhook, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
        alert("ENVIADO COM SUCESSO!");
        window.location.reload();
    }
    </script>
</body>
</html>
