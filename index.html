<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SISTEMA MILITAR | BGEex</title>

<style>
:root {
    --vermelho:#ff0000;
    --preto:#0a0a0a;
    --cinza:#1a1a1a;
    --dourado:#ffd700;
}

body {
    background: var(--preto);
    color:white;
    font-family:Arial;
    text-align:center;
    margin:0;
    padding:15px;
}

.btn-comprar-topo{
    position:fixed;
    top:15px;
    right:15px;
    color:red;
    font-weight:bold;
    cursor:pointer;
}

.card{
    background:#1a1a1a;
    border:2px solid red;
    max-width:600px;
    margin:60px auto;
    padding:20px;
    border-radius:10px;
}

input,select,textarea{
    width:100%;
    padding:10px;
    margin:5px 0;
    background:#222;
    color:white;
}

.questao{
    text-align:left;
    background:#111;
    padding:10px;
    margin:5px 0;
    border-left:4px solid red;
}

.btn-enviar{
    background:red;
    color:white;
    padding:15px;
    width:100%;
    border:none;
    cursor:pointer;
}

#loja_patentes{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:black;
    overflow:auto;
}

.loja-container{
    max-width:600px;
    margin:auto;
    background:#1a1a1a;
    padding:20px;
}

.item-patente{
    display:flex;
    justify-content:space-between;
    background:#222;
    margin:5px 0;
    padding:10px;
}

.btn-pagar{
    background:lime;
    border:none;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="btn-comprar-topo" onclick="abrirLoja()">🛒 COMPRAR PATENTE</div>

<div class="card">

<h2>SISTEMA BGEex</h2>

<input id="nome_discord" placeholder="Seu Discord">

<select id="selecao_curso" onchange="carregarQuestoes()">
<option value="">Curso</option>
<option value="IFB">IFB</option>
<option value="CLD">CLD</option>
<option value="CGE">CGE</option>
</select>

<div id="questoes_container"></div>

<button class="btn-enviar" onclick="enviarParaDiscord()">ENVIAR AO QG</button>

</div>

<!-- LOJA -->
<div id="loja_patentes">
<div class="loja-container">

<h3 style="color:gold">SHOP BGEex</h3>

<div id="lista_patentes">

<div class="item-patente"><span>DEVELOPERS</span><button class="btn-pagar" onclick="gerarPix('Developers','200')">R$200</button></div>
<div class="item-patente"><span>REI DAS MALDIÇÕES</span><button class="btn-pagar" onclick="gerarPix('Rei das Maldições','50')">R$50</button></div>
<div class="item-patente"><span>SEIS OLHOS</span><button class="btn-pagar" onclick="gerarPix('Seis Olhos','40')">R$40</button></div>
<div class="item-patente"><span>HEAD ADMIN</span><button class="btn-pagar" onclick="gerarPix('Head Admin','30')">R$30</button></div>
<div class="item-patente"><span>STAFF</span><button class="btn-pagar" onclick="gerarPix('Staff','25')">R$25</button></div>
<div class="item-patente"><span>SENADOR</span><button class="btn-pagar" onclick="gerarPix('Senador','20')">R$20</button></div>
<div class="item-patente"><span>AHD</span><button class="btn-pagar" onclick="gerarPix('AHD','15')">R$15</button></div>
<div class="item-patente"><span>GERENTE</span><button class="btn-pagar" onclick="gerarPix('Gerente','12')">R$12</button></div>
<div class="item-patente"><span>SUB GERENTE</span><button class="btn-pagar" onclick="gerarPix('Sub Gerente','10')">R$10</button></div>
<div class="item-patente"><span>ENTREGADOR</span><button class="btn-pagar" onclick="gerarPix('Entregador','8')">R$8</button></div>
<div class="item-patente"><span>HELPER</span><button class="btn-pagar" onclick="gerarPix('Helper','5')">R$5</button></div>
<div class="item-patente"><span>VIP</span><button class="btn-pagar" onclick="gerarPix('VIP','3')">R$3</button></div>

</div>

<button onclick="fecharLoja()">FECHAR</button>

</div>
</div>

<script>

const webhooks={
IFB:"https://discord.com/api/webhooks/1492932993101201600/r6AYp1XhAOHGTj5N5OqGpzLHCFjE1d9TodG8G6z9A0wZlqKISbeIPK5gB9K8XDeHvxhy",
CLD:"https://discord.com/api/webhooks/1492933366775812249/RT1OYt3EIS2KX14jZlw45yjN7bDMz1lrg7sAH3VfO2rpolKVOQZvDLn6mIwzWV6VE9Uv",
CGE:"https://discord.com/api/webhooks/1492933590961619167/-TMRlkEmAE63JBQVk2z6qKts5eRpHoIZR89ufMhhJ9ZMlx8sh36Mw0lppYpRX4AZHtcz"
};

const banco={
IFB:["Disciplina?","Hierarquia?","Ordem?","Respeito?","Missão?"],
CLD:["Liderança?","Estratégia?","Equipe?","Decisão?","Comando?"],
CGE:["QAP?","QSL?","Sigilo?","Ciber?","Comunicação?"]
};

function abrirLoja(){
document.getElementById("loja_patentes").style.display="block";
}

function fecharLoja(){
document.getElementById("loja_patentes").style.display="none";
}

function carregarQuestoes(){
let c=document.getElementById("selecao_curso").value;
let box=document.getElementById("questoes_container");
box.innerHTML="";
if(banco[c]){
banco[c].forEach(q=>{
box.innerHTML+=`<div class="questao"><p>${q}</p><textarea></textarea></div>`;
});
}
}

async function enviarParaDiscord(){

let nome=document.getElementById("nome_discord").value;
let curso=document.getElementById("selecao_curso").value;

if(!nome||!curso){
alert("Preencha tudo");
return;
}

let res="";
document.querySelectorAll("textarea").forEach((t,i)=>{
res+=`Q${i+1}: ${t.value}\n`;
});

await fetch(webhooks[curso],{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
username:"BGEex",
embeds:[{
title:"Prova enviada",
description:`Nome: ${nome}\n\n${res}`
}]
})
});

alert("Enviado!");
}

function gerarPix(produto, valor) {

    const chavePix = "DANILOBTU88@GMAIL.COM";
    const nome = "DANILO";
    const cidade = "BOTUCATU";

    document.getElementById('lista_patentes').style.display = 'none';
    document.getElementById('tela_pix').style.display = 'block';

    document.getElementById('patente_info').innerText =
        `${produto} | R$ ${parseFloat(valor).toFixed(2)}`;

    function emv(id, value) {
        return id + value.length.toString().padStart(2, '0') + value;
    }

    function crc16(payload) {
        let polinomio = 0x1021;
        let resultado = 0xFFFF;

        for (let i = 0; i < payload.length; i++) {
            resultado ^= (payload.charCodeAt(i) << 8);

            for (let j = 0; j < 8; j++) {
                if (resultado & 0x8000) {
                    resultado = (resultado << 1) ^ polinomio;
                } else {
                    resultado <<= 1;
                }
                resultado &= 0xFFFF;
            }
        }

        return resultado.toString(16).toUpperCase().padStart(4, '0');
    }

    let payload =
        emv("00", "01") +
        emv("01", "11") +
        emv("26",
            emv("00", "br.gov.bcb.pix") +
            emv("01", chavePix)
        ) +
        emv("52", "0000") +
        emv("53", "986") +
        emv("54", parseFloat(valor).toFixed(2)) +
        emv("58", "BR") +
        emv("59", nome) +
        emv("60", cidade) +
        emv("62", emv("05", produto)) +
        "6304";

    const crc = crc16(payload);
    const pixCode = payload + crc;

    document.getElementById('pix_texto').innerText = pixCode;

    document.getElementById('qr_pix').src =
        "https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=" +
        encodeURIComponent(pixCode);
}
</script>

</body>
</html>
