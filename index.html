function emv(id,val){return id+val.length.toString().padStart(2,'0')+val}

function crc16(p){
let poly=0x1021, r=0xFFFF;
for(let i=0;i<p.length;i++){
r^=(p.charCodeAt(i)<<8);
for(let j=0;j<8;j++){
r=(r&0x8000)?(r<<1)^poly:r<<1;
r&=0xFFFF;
}}
return r.toString(16).toUpperCase().padStart(4,'0');
}
