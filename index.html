<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INSTITUTO MENTE GENIAL | PROVAS</title>
    <style>
        :root { --vermelho: #ff0000; --preto: #0a0a0a; --cinza: #1a1a1a; }
        body { background: var(--preto); color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .card { background: var(--cinza); border: 2px solid var(--vermelho); border-radius: 10px; padding: 20px; max-width: 600px; margin: auto; }
        h1 { color: var(--vermelho); text-transform: uppercase; }
        select, input, textarea { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; border: none; box-sizing: border-box; background: #222; color: #fff; }
        .questao { text-align: left; background: #111; padding: 15px; border-radius: 5px; margin-bottom: 10px; border-left: 4px solid var(--vermelho); }
        .nivel { font-size: 0.75em; font-weight: bold; text-transform: uppercase; display: block; margin-bottom: 5px; }
        .facil { color: #00ff00; }
        .dificil { color: #ff0000; }
        .btn { background: var(--vermelho); color: white; padding: 18px; border: none; width: 100%; font-weight: bold; cursor: pointer; margin-top: 20px; font-size: 1.1em; }
    </style>
</head>

        <p>SELECIONE O CURSO DESEJADO:</p>

    function carregarQuestoes() {
        const curso = document.getElementById('selecao_curso').value;
        const container = document.getElementById('questoes_container');
        if (!curso) return document.getElementById('area_provas').style.display = 'none';

        document.getElementById('area_provas').style.display = 'block';
        container.innerHTML = "";
        
        banco[curso].forEach((item, i) => {
            const cor = item.t.includes("Fácil") ? "facil" : "dificil";
            container.innerHTML += `
                <div class="questao">
                    <span class="nivel ${cor}">[ ${item.t} ]</span>
                    <p><b>${item.q}</b></p>
                    <textarea id="res_${i}" placeholder="Sua resposta extrema aqui..."></textarea>
                </div>`;
        });
    }

        for(let i=0; i<10; i++) {

        }

        };

        await fetch(webhook, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });

</body>
</html>
