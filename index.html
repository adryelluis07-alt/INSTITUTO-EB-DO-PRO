<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SISTEMA MILITAR | BGEex</title>

<style>
:root {
    --vermelho: #ff0000;
    --preto: #0a0a0a;
    --cinza: #1a1a1a;
    --dourado: #ffd700;
}

body {
    background: var(--preto);
    color: white;
    font-family: Arial, sans-serif;
    text-align: center;
    padding: 15px;
    margin: 0;
}

/* 🔵 BARRA DISCORD (NOVA) */
.discord-bar {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    background: #111;
    color: white;
    font-size: 11px;
    padding: 6px;
    z-index: 99999;
    border-bottom: 2px solid #5865F2;
}

.discord-bar a {
    color: #00ffcc;
    margin: 0 5px;
    text-decoration: none;
}

/* BOTÃO LOJA */
.btn-comprar-topo {
    position: fixed;
    top: 40px;
    right: 15px;
    color: var(--vermelho);
    font-weight: bold;
    cursor: pointer;
    z-index: 9999;
}

/* CARD */
.card {
    background: var(--cinza);
    border: 2px solid var(--vermelho);
    border-radius: 10px;
    padding: 20px;
    max-width: 600px;
    margin: 80px auto 20px;
}

/* LOJA */
#loja_patentes {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.95);
    z-index: 10000;
    overflow-y: auto;
    padding: 20px;
}

.loja-container {
    max-width: 550px;
    margin: auto;
    background: var(--cinza);
    border: 2px solid var(--dourado);
    padding: 20px;
    border-radius: 15px;
}

.item-patente {
    background: #222;
    margin: 8px 0;
    padding: 10px;
    border-radius: 8px;
    display: flex;
    justify-content: space-between;
    border-left: 4px solid var(--dourado);
}

.btn-pagar {
    background: #0f0;
    border: none;
    cursor: pointer;
    font-weight: bold;
}

/* MODAL NOVO */
#modal_discord {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.95);
    z-index: 999999;
    text-align: center;
    padding-top: 120px;
}

.modal-box {
    background: #1a1a1a;
    max-width: 400px;
    margin: auto;
    padding: 20px;
    border-radius: 10px;
    border: 2px solid #5865F2;
}

.modal-box input {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    background: #222;
    color: white;
    border: none;
}
</style>
</head>

<body>

<!-- 🔵 BARRA DISCORD -->
<div class="discord-bar">
<b>Servers:</b>
<a href="https://discord.gg/SW2kctdRd" target="_blank">1</a> |
<a href="https://discord.gg/Eys2zFNAK" target="_blank">2</a> |
<a href="https://discord.gg/jfqgMGbJm" target="_blank">3</a>
</div>

<!-- BOTÃO -->
<div class="btn-comprar-topo" onclick="abrirModal()">🛒 COMPRAR PATENTE</div>

<!-- PROVAS -->
<div class="card">
<h1>MENTE GENIAL</h1>

<input id="nome_discord" placeholder="SEU NOME NO DISCORD">

<select id="selecao_curso" onchange="carregarQuestoes()">
<option value="">ESCOLHA O CURSO</option>
<option value="IFB">IFB</option>
<option value="CLD">CLD</option>
<option value="CGE">CGE</option>
</select>

<div id="questoes_container"></div>

<button onclick="enviarParaDiscord()">ENVIAR</button>
</div>

<!-- LOJA -->
<div id="loja_patentes">
<div class="loja-container">

<h2>SHOP BGEex</h2>

<div class="item-patente">
<span>VIP</span><span>R$3</span>
<button class="btn-pagar" onclick="gerarPix('VIP','3')">COMPRAR</button>
</div>

<div class="item-patente">
<span>STAFF</span><span>R$25</span>
<button class="btn-pagar" onclick="gerarPix('STAFF','25')">COMPRAR</button>
</div>

</div>
</div>

<!-- MODAL DISCORD -->
<div id="modal_discord">
<div class="modal-box">

<h2 style="color:#5865F2;">⚠️ ENTRE NO DISCORD</h2>

<p>Para comprar, coloque seu usuário do Discord:</p>

<input id="discord_user" placeholder="Ex: Adryel0416">

<br><br>

<button onclick="fecharModal()" style="
background:#5865F2;
color:white;
padding:10px;
width:100%;
border:none;
cursor:pointer;
">
ENTENDI
</button>

</div>
</div>

<script>

/* MODAL */
function abrirModal(){
document.getElementById("modal_discord").style.display="block";
}

function fecharModal(){
let nome=document.getElementById("discord_user").value;

if(!nome){
alert("Digite seu usuário do Discord!");
return;
}

document.getElementById("modal_discord").style.display="none";
}

/* PIX */
function gerarPix(produto,valor){
alert("Gerando PIX para "+produto+" R$"+valor);
}

/* QUESTÕES */
const banco={
IFB:["Q1","Q2","Q3","Q4","Q5","Q6","Q7","Q8","Q9","Q10"],
CLD:["Q1","Q2","Q3","Q4","Q5","Q6","Q7","Q8","Q9","Q10"],
CGE:["Q1","Q2","Q3","Q4","Q5","Q6","Q7","Q8","Q9","Q10"]
};

function carregarQuestoes(){
let c=document.getElementById("selecao_curso").value;
let box=document.getElementById("questoes_container");
box.innerHTML="";
if(banco[c]){
banco[c].forEach((q,i)=>{
box.innerHTML+=`<div class="questao">
<p>${i+1}. ${q}</p>
<textarea></textarea>
</div>`;
});
}
}

function enviarParaDiscord(){
alert("Enviado!");
}

</script>

</body>
</html>
