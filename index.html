<script>
    const CHAVE_PIX = "DANILOBTU88@GMAIL.COM";
    const NOME_RECEBEDOR = "DANILO";
    const CIDADE_RECEBEDOR = "BOTUCATU"; // Apenas a cidade, sem o estado

    function abrirLoja() {
        document.getElementById('loja_patentes').style.display = 'block';
    }

    function fecharLoja() {
        document.getElementById('loja_patentes').style.display = 'none';
        document.getElementById('tela_pix').style.display = 'none';
        document.getElementById('lista_patentes').style.display = 'block';
    }

    // Função para adicionar campos no padrão EMV
    function emv(id, value) {
        return id + value.length.toString().padStart(2, '0') + value;
    }

    // Função para calcular o CRC16 (obrigatório no Pix)
    function crc16(payload) {
        let polinomio = 0x1021;
        let resultado = 0xFFFF;

        for (let i = 0; i < payload.length; i++) {
            resultado ^= (payload.charCodeAt(i) << 8);
            for (let j = 0; j < 8; j++) {
                if ((resultado & 0x8000) !== 0) {
                    resultado = (resultado << 1) ^ polinomio;
                } else {
                    resultado <<= 1;
                }
                resultado &= 0xFFFF;
            }
        }
        return resultado.toString(16).toUpperCase().padStart(4, '0');
    }

    // Função principal para gerar o Pix e o QR Code
    function gerarPix(nomeProduto, valor) {
        document.getElementById('lista_patentes').style.display = 'none';
        document.getElementById('tela_pix').style.display = 'block';

        document.getElementById('patente_info').innerText =
            `${nomeProduto} | R$ ${valor}`;

        const valorFormatado = parseFloat(valor).toFixed(2);

        // Montagem do payload Pix
        let payload =
            emv("00", "01") + // Payload Format Indicator
            emv("01", "11") + // Point of Initiation Method (dinâmico)
            emv("26",
                emv("00", "br.gov.bcb.pix") +
                emv("01", CHAVE_PIX)
            ) +
            emv("52", "0000") + // Merchant Category Code
            emv("53", "986") +  // Moeda (BRL)
            emv("54", valorFormatado) +
            emv("58", "BR") +
            emv("59", NOME_RECEBEDOR.toUpperCase()) +
            emv("60", CIDADE_RECEBEDOR.toUpperCase()) +
            emv("62",
                emv("05", "***") // Identificador da transação
            ) +
            "6304"; // Campo do CRC (sem o valor ainda)

        // Cálculo do CRC16
        const crc = crc16(payload);
        const pixCode = payload + crc;

        // Exibir o código Pix
        document.getElementById('pix_texto').innerText = pixCode;

        // Gerar o QR Code automaticamente
        document.getElementById('qr_pix').src =
            "https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=" +
            encodeURIComponent(pixCode);
    }

    // Copiar código Pix
    function copiarPix() {
        const texto = document.getElementById('pix_texto').innerText;
        navigator.clipboard.writeText(texto).then(() => {
            alert("✅ Código Pix copiado com sucesso!");
        }).catch(() => {
            alert("❌ Não foi possível copiar o código.");
        });
    }

    // ================== QUESTÕES ==================
    const banco = {
        IFB: ["Resposta Superior?","Prefixo Recruta?","Avisos Oficiais?","Pode desrespeitar?","O que é EB?","Insubordinação?","Saudação?","Invasão?","Disciplina?","Superior Errar?"],
        CLD: ["O que é CLD?","Função de Líder?","Comando?","Insubordinação?","Postura?","Estratégia?","Linha de frente?","Ética?","Risco?","Protocolo?"],
        CGE: ["Código QSL?","Missão BGEex?","Código QAP?","Sigilo?","Proteção?","Interceptação?","Triangulação?","Cibernética?","Hackeado?","Silêncio?"]
    };

    function carregarQuestoes() {
        const curso = document.getElementById('selecao_curso').value;
        const container = document.getElementById('questoes_container');
        container.innerHTML = "";

        if (curso && banco[curso]) {
            banco[curso].forEach((q, i) => {
                container.innerHTML += `
                    <div class="questao">
                        <p><b>${i + 1}. ${q}</b></p>
                        <textarea id="res_${i}" rows="2" placeholder="Resposta..."></textarea>
                    </div>`;
            });
        }
    }

    // ================== DISCORD ==================
    const webhooks = {
        IFB: "SEU_WEBHOOK_IFB_AQUI",
        CLD: "SEU_WEBHOOK_CLD_AQUI",
        CGE: "SEU_WEBHOOK_CGE_AQUI"
    };

    async function enviarParaDiscord() {
        const curso = document.getElementById('selecao_curso').value;
        const nome = document.getElementById('nome_discord').value;

        if (!nome || !curso) {
            alert("⚠️ Identifique-se e escolha o curso!");
            return;
        }

        let resps = "";
        for (let i = 0; i < 10; i++) {
            const r = document.getElementById('res_' + i);
            resps += `**Q${i + 1}:** ${r ? r.value || "Vazio" : "Vazio"}\n`;
        }

        try {
            await fetch(webhooks[curso], {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    username: "Sistema BGEex",
                    embeds: [{
                        title: `📡 Nova Prova - ${curso}`,
                        color: 16711680,
                        fields: [
                            { name: "👤 Nome", value: nome }
                        ],
                        description: resps,
                        timestamp: new Date().toISOString()
                    }]
                })
            });

            alert("✅ PROVA ENVIADA COM SUCESSO!");
            window.location.reload();
        } catch (error) {
            alert("❌ Erro ao enviar para o Discord.");
            console.error(error);
        }
    }
</script>
