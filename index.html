<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA MILITAR | BGEex</title>
    <style>
        :root { --vermelho: #ff0000; --preto: #0a0a0a; --cinza: #1a1a1a; --dourado: #ffd700; }
        body { background: var(--preto); color: white; font-family: sans-serif; text-align: center; padding: 15px; margin: 0; }
        
        .btn-comprar-topo { position: absolute; top: 15px; right: 15px; color: var(--vermelho); text-decoration: underline; font-weight: bold; cursor: pointer; text-transform: uppercase; z-index: 9999; font-size: 14px; padding: 10px; }
        .card { background: var(--cinza); border: 2px solid var(--vermelho); border-radius: 10px; padding: 20px; max-width: 600px; margin: 60px auto 20px; position: relative; }
        h1 { color: var(--vermelho); text-transform: uppercase; }
        
        /* Modal da Loja */
        #loja_patentes { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--preto); z-index: 10000; overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .loja-container { max-width: 550px; margin: auto; background: var(--cinza); border: 2px solid var(--dourado); padding: 20px; border-radius: 15px; text-align: left; }
        .item-patente { background: #222; margin: 8px 0; padding: 12px; border-radius: 8px; border-left: 4px solid var(--dourado); display: flex; justify-content: space-between; align-items: center; }
        .preco { color: #0f0; font-weight: bold; }
        .btn-pagar { background: #0f0; color: #000; border: none; padding: 8px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        
        /* Tela de Pagamento PIX */
        #tela_pix { display: none; text-align: center; padding: 20px; border: 2px dashed var(--dourado); margin-top: 15px; }
        #qr_pix { width: 200px; height: 200px; background: white; padding: 10px; border-radius: 10px; margin: 15px auto; }
        .codigo-pix { background: #333; color: #0f0; padding: 10px; word-break: break-all; font-family: monospace; font-size: 10px; margin: 15px 0; border-radius: 5px; border: 1px solid #555; max-height: 60px; overflow: hidden; }
        
        .btn-copiar { background: #5865F2; color: white; padding: 10px; border: none; border-radius: 5px; width: 100%; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        input, select, textarea { width: 100%; padding: 15px; margin: 10px 0; border-radius: 5px; border: 1px solid #444; background: #222; color: #fff; box-sizing: border-box; font-size: 16px; }
        .questao { text-align: left; background: #111; padding: 15px; border-radius: 5px; margin-bottom: 20px; border-left: 5px solid var(--vermelho); }
        .btn-enviar { background: var(--vermelho); color: white; padding: 20px; border: none; width: 100%; font-weight: bold; cursor: pointer; border-radius: 8px; font-size: 1.1em; }
    </style>
</head>
<body>

    <div class="btn-comprar-topo" onclick="abrirLoja()">🛒 COMPRAR PATENTE</div>

    <!-- LOJA UNIFICADA -->
    <div id="loja_patentes">
        <div class="loja-container">
            <h2 style="color:var(--dourado); text-align: center; margin-top:0;">🏛️ SHOP MILITAR - BGEex</h2>
            <div id="lista_patentes">
                <div class="item-patente"><span>[RDE] REAIS DEVELOPERS</span> <span class="preco">R$ 200,00</span> <button class="btn-pagar" onclick="gerarPix('Developers', '200.00')">COMPRAR</button></div>
                <div class="item-patente"><span>[DK] REI DAS MALDIÇÕES</span> <span class="preco">R$ 50,00</span> <button class="btn-pagar" onclick="gerarPix('Rei das Maldições', '50.00')">COMPRAR</button></div>
                <div class="item-patente"><span>HEADADMIN DO EB</span> <span class="preco">R$ 35,00</span> <button class="btn-pagar" onclick="gerarPix('HeadAdmin', '35.00')">COMPRAR</button></div>
                <div class="item-patente"><span>VIP DIAMANTE</span> <span class="preco">R$ 5,00</span> <button class="btn-pagar" onclick="gerarPix('VIP', '5.00')">COMPRAR</button></div>
            </div>

            <div id="tela_pix">
                <h3 style="color:#0f0">PAGAMENTO VIA PIX</h3>
                <p id="patente_info" style="font-weight: bold;"></p>
                
                <!-- QR CODE REAL -->
                <img id="qr_pix" src="" alt="QR Code Pix">
                
                <p style="font-size: 12px;">Clique abaixo para copiar o código:</p>
                <div class="codigo-pix" id="pix_texto">Gerando código...</div>
                <button class="btn-copiar" onclick="copiarPix()">📋 COPIAR CÓDIGO PIX</button>
                
                <button class="btn-enviar" onclick="fecharLoja()" style="padding:10px; background:#444;">VOLTAR AO SHOP</button>
            </div>
            <button onclick="fecharLoja()" style="width:100%; margin-top:15px; background:none; color:white; border:1px solid #555; padding:10px; cursor:pointer;">FECHAR</button>
        </div>
    </div>

    <!-- SISTEMA DE PROVAS -->
    <div class="card">
        <h1>𝗠𝗘𝗡𝗧𝗘⠀𝗚𝗘𝗡𝗜𝗔𝗟</h1>
        <p>📡 PORTAL DE AVALIAÇÕES</p>
        <input type="text" id="nome_discord" placeholder="SEU NOME NO DISCORD">
        <select id="selecao_curso" onchange="carregarQuestoes()">
            <option value="">-- ESCOLHA O CURSO --</option>
            <option value="IFB">INSTRUÇÃO BÁSICA (IFB)</option>
            <option value="CLD">CURSO DE LIDERANÇA (CLD)</option>
            <option value="CGE">GUERRA ELETRÔNICA (CGE)</option>
        </select>
        <div id="questoes_container"></div>
        <button class="btn-enviar" onclick="enviarParaDiscord()">ENVIAR AO QG</button>
    </div>

    <script>
        // CONFIGURAÇÕES DO PIX
        const CHAVE_PIX = "DANILOBTU88@GMAIL.COM";
        const NOME_RECEBEDOR = "DANILO";
        const CIDADE_RECEBEDOR = "UBERABA";

        function abrirLoja() { document.getElementById('loja_patentes').style.display = 'block'; }
        function fecharLoja() { 
            document.getElementById('loja_patentes').style.display = 'none'; 
            document.getElementById('tela_pix').style.display = 'none';
            document.getElementById('lista_patentes').style.display = 'block';
        }

        function gerarPix(nome, valor) {
            document.getElementById('lista_patentes').style.display = 'none';
            document.getElementById('tela_pix').style.display = 'block';
            document.getElementById('patente_info').innerText = nome + " | R$ " + valor;

            // Gera o código "Copia e Cola" (Simulado para o navegador aceitar)
            const pixCode = `00020101021126490014br.gov.bcb.pix0122${CHAVE_PIX}5204000053039865405${valor}5802BR5906${NOME_RECEBEDOR}6007${CIDADE_RECEBEDOR}62070503***6304`;
            
            document.getElementById('pix_texto').innerText = pixCode;
            // Gera o QR Code baseado no código Pix
            document.getElementById('qr_pix').src = "https://qrserver.com" + encodeURIComponent(pixCode);
        }

        function copiarPix() {
            const texto = document.getElementById('pix_texto').innerText;
            navigator.clipboard.writeText(texto).then(() => {
                alert("Código Pix copiado! Cole no seu banco.");
            });
        }

        // SISTEMA DE QUESTÕES (BANCO)
        const banco = {
            IFB: ["Resposta Superior?","Prefixo Recruta?","Avisos Oficiais?","Pode desrespeitar?","O que é EB?","Insubordinação?","Saudação?","Invasão?","Disciplina?","Superior Errar?"],
            CLD: ["O que é CLD?","Função de Líder?","Comando?","Insubordinação?","Postura?","Estratégia?","Linha de frente?","Ética?","Risco?","Protocolo?"],
            CGE: ["Código QSL?","Missão BGEex?","Código QAP?","Sigilo?","Proteção?","Interceptação?","Triangulação?","Cibernética?","Hackeado?","Silêncio?"]
        };

        function carregarQuestoes() {
            const curso = document.getElementById('selecao_curso').value;
            const container = document.getElementById('questoes_container');
            container.innerHTML = "";
            if(curso && banco[curso]) {
                banco[curso].forEach((q, i) => {
                    container.innerHTML += `<div class="questao"><p><b>${i+1}. ${q}</b></p><textarea id="res_${i}" rows="2"></textarea></div>`;
                });
            }
        }

        async function enviarParaDiscord() {
            // Seus Webhooks aqui...
            alert("Enviado com sucesso!");
        }
    </script>
</body>
</html>
