<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SISTEMA MILITAR | BGEex</title>

<style>
:root {
    --vermelho: #ff0000;
    --preto: #0a0a0a;
    --cinza: #1a1a1a;
    --dourado: #ffd700;
}

body {
    background: var(--preto);
    color: white;
    font-family: Arial, sans-serif;
    text-align: center;
    padding: 15px;
    margin: 0;
}

.btn-comprar-topo {
    position: fixed;
    top: 15px;
    right: 15px;
    color: var(--vermelho);
    text-decoration: underline;
    font-weight: bold;
    cursor: pointer;
    z-index: 9999;
    font-size: 13px;
    padding: 10px;
}

.card {
    background: var(--cinza);
    border: 2px solid var(--vermelho);
    border-radius: 10px;
    padding: 20px;
    max-width: 600px;
    margin: 60px auto 20px;
}

h1 {
    color: var(--vermelho);
    text-transform: uppercase;
    font-size: 1.4em;
}

input, select, textarea {
    width: 100%;
    padding: 15px;
    margin: 10px 0;
    border-radius: 5px;
    border: 1px solid #444;
    background: #222;
    color: #fff;
    font-size: 16px;
}

.questao {
    text-align: left;
    background: #111;
    padding: 15px;
    border-radius: 5px;
    margin-bottom: 20px;
    border-left: 5px solid var(--vermelho);
}

.btn-enviar {
    background: var(--vermelho);
    color: white;
    padding: 20px;
    border: none;
    width: 100%;
    font-weight: bold;
    cursor: pointer;
    border-radius: 8px;
    font-size: 1.1em;
}

#loja_patentes {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.95);
    z-index: 10000;
    overflow-y: auto;
    padding: 20px;
}

.loja-container {
    max-width: 550px;
    margin: auto;
    background: var(--cinza);
    border: 2px solid var(--dourado);
    padding: 20px;
    border-radius: 15px;
}

.item-patente {
    background: #222;
    margin: 8px 0;
    padding: 10px;
    border-radius: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.preco {
    color: #0f0;
    font-weight: bold;
}

.btn-pagar {
    background: #0f0;
    color: #000;
    border: none;
    padding: 6px 10px;
    font-weight: bold;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="btn-comprar-topo" onclick="abrirLoja()">🛒 COMPRAR PATENTE</div>

<div class="card">
    <h1>𝗠𝗘𝗡𝗧𝗘⠀𝗚𝗘𝗡𝗜𝗔𝗟</h1>

    <input id="nome_discord" placeholder="SEU NOME NO DISCORD">

    <select id="selecao_curso" onchange="carregarQuestoes()">
        <option value="">ESCOLHA O CURSO</option>
        <option value="IFB">IFB</option>
        <option value="CLD">CLD</option>
        <option value="CGE">CGE</option>
    </select>

    <div id="questoes_container"></div>

    <button class="btn-enviar">ENVIAR</button>
</div>

<!-- LOJA -->
<div id="loja_patentes">
<div class="loja-container">

<h2>SHOP BGEex</h2>

<div class="item-patente">
<span>VIP DIAMANTE</span>
<button class="btn-pagar" onclick="gerarPix('VIP DIAMANTE','3.00')">COMPRAR</button>
</div>

<div class="item-patente">
<span>STAFF</span>
<button class="btn-pagar" onclick="gerarPix('STAFF','25.00')">COMPRAR</button>
</div>

<button onclick="fecharLoja()" style="margin-top:15px;width:100%;padding:10px;">FECHAR</button>

</div>
</div>

<script>

/* LOJA */
function abrirLoja(){
    document.getElementById("loja_patentes").style.display = "block";
}

function fecharLoja(){
    document.getElementById("loja_patentes").style.display = "none";
}

/* ETAPA OBRIGATÓRIA */
function gerarPix(produto, valor){

    const discordUser = prompt("Adicione seu usuário do Discord!");

    if(!discordUser || discordUser.trim() === ""){
        alert("Você precisa colocar seu usuário do Discord!");
        return;
    }

    alert(
        "Usuário: " + discordUser +
        "\nProduto: " + produto +
        "\nValor: R$ " + valor
    );
}

/* 🔥 QUESTÕES COMPLETAS */
const banco = {
IFB: [
"Resposta Superior?",
"Prefixo Recruta?",
"Avisos Oficiais?",
"Pode desrespeitar?",
"O que é EB?",
"Insubordinação?",
"Saudação militar?",
"Invasão de protocolo?",
"Disciplina militar?",
"Superior pode errar?"
],

CLD: [
"O que é CLD?",
"Função de líder?",
"O que é comando?",
"Insubordinação no CLD?",
"Postura correta?",
"Estratégia militar?",
"Linha de frente?",
"Ética militar?",
"Gestão de risco?",
"Protocolo de operação?"
],

CGE: [
"Código QSL significa?",
"Missão BGEex?",
"O que é QAP?",
"Por que sigilo é importante?",
"Proteção de dados?",
"Interceptação de comunicação?",
"Triangulação de sinal?",
"Cibersegurança básica?",
"Conta hackeada o que fazer?",
"Silêncio operacional?"
]
};

function carregarQuestoes(){
let c=document.getElementById("selecao_curso").value;
let box=document.getElementById("questoes_container");
box.innerHTML="";

if(banco[c]){
banco[c].forEach((q,i)=>{
box.innerHTML+=`
<div class="questao">
<p>${i+1}. ${q}</p>
<textarea></textarea>
</div>`;
});
}
}

</script>

</body>
</html>
