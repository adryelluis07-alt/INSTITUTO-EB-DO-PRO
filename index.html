<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA MILITAR | BGEex</title>
    <style>
        :root { --vermelho: #ff0000; --preto: #0a0a0a; --cinza: #1a1a1a; --dourado: #ffd700; }
        body { background: var(--preto); color: white; font-family: sans-serif; text-align: center; padding: 15px; margin: 0; }
        
        /* Botão Comprar Patente */
        .btn-comprar-topo { position: absolute; top: 15px; right: 15px; color: var(--vermelho); text-decoration: underline; font-weight: bold; cursor: pointer; text-transform: uppercase; z-index: 9999; font-size: 14px; padding: 10px; }

        .card { background: var(--cinza); border: 2px solid var(--vermelho); border-radius: 10px; padding: 20px; max-width: 600px; margin: 60px auto 20px; position: relative; }
        h1 { color: var(--vermelho); text-transform: uppercase; margin-bottom: 5px; }
        
        /* Modal da Loja */
        #loja_patentes { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--preto); z-index: 10000; overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .loja-container { max-width: 550px; margin: auto; background: var(--cinza); border: 2px solid var(--dourado); padding: 20px; border-radius: 15px; text-align: left; }
        .item-patente { background: #222; margin: 10px 0; padding: 15px; border-radius: 8px; border-left: 4px solid var(--dourado); display: flex; justify-content: space-between; align-items: center; }
        .preco { color: #0f0; font-weight: bold; }
        .btn-pagar { background: #0f0; color: #000; border: none; padding: 10px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        
        #tela_pix { display: none; text-align: center; padding: 20px; border: 2px dashed var(--dourado); margin-top: 15px; }
        .codigo-pix { background: #fff; color: #000; padding: 10px; word-break: break-all; font-family: monospace; font-size: 12px; margin: 15px 0; border-radius: 5px; font-weight: bold; }
        
        input, select, textarea { width: 100%; padding: 15px; margin: 10px 0; border-radius: 5px; border: 1px solid #444; background: #222; color: #fff; box-sizing: border-box; font-size: 16px; }
        .questao { text-align: left; background: #111; padding: 15px; border-radius: 5px; margin-bottom: 20px; border-left: 5px solid var(--vermelho); }
        .btn-enviar { background: var(--vermelho); color: white; padding: 20px; border: none; width: 100%; font-weight: bold; cursor: pointer; border-radius: 8px; font-size: 1.1em; }
    </style>
</head>
<body>

    <div class="btn-comprar-topo" onclick="abrirLoja()">🛒 COMPRAR PATENTE</div>

    <!-- ABA DE SHOP -->
    <div id="loja_patentes">
        <div class="loja-container">
            <h2 style="color:var(--dourado); text-align: center;">🏛️ SHOP MILITAR - BGEex</h2>
            <div id="lista_patentes">
                <div class="item-patente"><span>[DK] REI DAS MALDIÇÕES</span> <span class="preco">R$ 200</span> <button class="btn-pagar" onclick="gerarPix('Rei das Maldições', '200,00')">PIX</button></div>
                <div class="item-patente"><span>[SY] SEIS OLHOS</span> <span class="preco">R$ 180</span> <button class="btn-pagar" onclick="gerarPix('Seis Olhos', '180,00')">PIX</button></div>
                <div class="item-patente"><span>HEAD ADMIN EB</span> <span class="preco">R$ 150</span> <button class="btn-pagar" onclick="gerarPix('Head Admin', '150,00')">PIX</button></div>
                <div class="item-patente"><span>VIP DIAMANTE</span> <span class="preco">R$ 30</span> <button class="btn-pagar" onclick="gerarPix('VIP', '30,00')">PIX</button></div>
            </div>

            <div id="tela_pix">
                <h3 style="color:#0f0">DADOS DE PAGAMENTO</h3>
                <p id="patente_info"></p>
                <img src="" id="qr_pix" style="width:180px; background:white; padding:10px; border-radius:5px;">
                <p style="margin-top:10px;">Chave PIX (E-mail):</p>
                <div class="codigo-pix" id="pix_texto">DANILOBTU88@GMAIL.COM</div>
                <button class="btn-enviar" onclick="fecharLoja()" style="padding:10px; margin-top:10px;">VOLTAR</button>
            </div>
            <button onclick="fecharLoja()" style="width:100%; margin-top:15px; background:none; color:white; border:1px solid #555; padding:10px; cursor:pointer;">FECHAR</button>
        </div>
    </div>

    <!-- PORTAL DE PROVAS -->
    <div class="card">
        <h1>𝗠𝗘𝗡𝗧𝗘⠀𝗚𝗘𝗡𝗜𝗔𝗟</h1>
        <p>📡 PORTAL DE AVALIAÇÕES</p>
        <input type="text" id="nome_discord" placeholder="SEU NOME NO DISCORD">
        <select id="selecao_curso" onchange="carregarQuestoes()">
            <option value="">-- ESCOLHA O CURSO --</option>
            <option value="IFB">INSTRUÇÃO BÁSICA (IFB)</option>
            <option value="CLD">CURSO DE LIDERANÇA (CLD)</option>
            <option value="CGE">GUERRA ELETRÔNICA (CGE)</option>
        </select>
        <div id="questoes_container"></div>
        <button class="btn-enviar" onclick="enviarParaDiscord()">ENVIAR AO QG</button>
    </div>

    <script>
        // FORÇA O CARREGAMENTO DAS FUNÇÕES
        function abrirLoja() {
            document.getElementById('loja_patentes').style.display = 'block';
        }

        function fecharLoja() { 
            document.getElementById('loja_patentes').style.display = 'none'; 
            document.getElementById('tela_pix').style.display = 'none';
            document.getElementById('lista_patentes').style.display = 'block';
        }

        function gerarPix(nome, valor) {
            document.getElementById('lista_patentes').style.display = 'none';
            document.getElementById('tela_pix').style.display = 'block';
            document.getElementById('patente_info').innerText = nome + " | R$ " + valor;
            const chave = "DANILOBTU88@GMAIL.COM";
            document.getElementById('qr_pix').src = "https://qrserver.com" + chave;
        }

        const banco = {
            IFB: ["Resposta Superior?","Prefixo Recruta?","Avisos Oficiais?","Pode desrespeitar?","O que é EB?","Insubordinação?","Saudação?","Invasão?","Disciplina?","Superior Errar?"],
            CLD: ["O que é CLD?","Função de Líder?","Comando?","Insubordinação?","Postura?","Estratégia?","Linha de frente?","Ética?","Risco?","Protocolo?"],
            CGE: ["Código QSL?","Missão BGEex?","Código QAP?","Sigilo?","Proteção?","Interceptação?","Triangulação?","Cibernética?","Hackeado?","Silêncio?"]
        };

        function carregarQuestoes() {
            const curso = document.getElementById('selecao_curso').value;
            const container = document.getElementById('questoes_container');
            container.innerHTML = "";
            if(curso && banco[curso]) {
                banco[curso].forEach((q, i) => {
                    const div = document.createElement('div');
                    div.className = 'questao';
                    div.innerHTML = `<p><b>${i+1}. ${q}</b></p><textarea id="res_${i}" rows="2" placeholder="Sua resposta..."></textarea>`;
                    container.appendChild(div);
                });
            }
        }

        async function enviarParaDiscord() {
            const webhooks = {
                IFB: "https://discord.com",
                CLD: "https://discord.com",
                CGE: "https://discord.com"
            };
            const curso = document.getElementById('selecao_curso').value;
            const nome = document.getElementById('nome_discord').value;
            if(!nome || !curso) return alert("⚠️ Identifique-se!");
            
            let resps = "";
            for(let i=0; i<10; i++) {
                const campo = document.getElementById('res_'+i);
                resps += `**Q${i+1}:** ${campo ? campo.value : "Vazio"}\n`;
            }

            await fetch(webhooks[curso], {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ embeds: [{ title: `🚩 NOVA PROVA: ${curso}`, color: 16711680, description: `**SOLDADO:** ${nome}\n\n${resps}` }]})
            });
            alert("PROVA ENVIADA!");
            window.location.reload();
        }
    </script>
</body>
</html>
